publish:
  whoami: asf-site

github:
  description: "Website sources for Apache MINA"
  homepage: https://mina.apache.org/
  labels:
    - apache
    - mina
    - hugo
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
